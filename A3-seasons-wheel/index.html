<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toronto Energy Seasons Wheel</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <h1>Toronto Energy Seasons Wheel</h1>
      <div class="controls" aria-label="Chart controls">
        <div class="segmented" id="measure-toggle" role="group" aria-label="Measure toggle">
          <button class="is-active" data-measure="electricity">Electricity</button>
          <button data-measure="gas">Natural Gas</button>
        </div>
      </div>
    </header>

    <section class="chart-card">
      <svg id="wheel" viewBox="0 0 980 900" aria-labelledby="chart-title chart-desc" role="img">
        <title id="chart-title">Radial monthly energy intensity chart</title>
        <desc id="chart-desc">A circular chart showing monthly energy intensity by building type. Hover points for details and use the controls to animate the year.</desc>
      </svg>
      <div id="legend" class="legend" aria-label="Legend"></div>
      <div id="tooltip" class="tooltip" hidden></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="js/main.js"></script>
</body>
</html>
