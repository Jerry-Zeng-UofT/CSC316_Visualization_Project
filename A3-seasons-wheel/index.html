<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toronto Energy Seasons Wheel</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<main class="page">
  <section class="chart-card">
    <div class="chart-card-header">
      <h1>Toronto Energy Seasons Wheel</h1>

      <div class="controls" aria-label="Chart controls">
        <span class="energy-type-label">Energy type:</span>
        <div class="segmented" id="measure-toggle" role="group" aria-label="Measure toggle">
          <button class="is-active" data-measure="electricity">
            <img src="img/electricity.png" alt="" class="toggle-icon">
            <span>Electricity</span>
          </button>
          <button data-measure="gas">
            <img src="img/natural_gas.png" alt="" class="toggle-icon">
            <span>Natural Gas</span>
          </button>
        </div>
      </div>
    </div>

    <div class="chart-layout">
      <div class="wheel-panel">
        <svg id="wheel" viewBox="0 0 980 900" aria-labelledby="chart-title chart-desc" role="img">
          <title id="chart-title">Radial monthly energy intensity chart</title>
          <desc id="chart-desc">A circular chart showing monthly energy intensity by building type.</desc>
        </svg>
      </div>

      <aside class="legend-side" aria-label="Legend area">
        <img src="img/heater.png" alt="Natural gas heater" class="energy-art art-heater">
        <div id="legend" class="legend legend-column" aria-label="Legend"></div>
        <img src="img/bulb.png" alt="Electric light bulb" class="energy-art art-bulb">
      </aside>
    </div>

    <div id="tooltip" class="tooltip" hidden></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="js/main.js"></script>
</body>
</html>
